trigger: none

resources:
  pipelines:
    - pipeline: BuildPipeline
      source: 'DVOP_PatientPortal'
      trigger:
        branches:
          include:
            - '104.112'

variables:
  - group: Keylocker
  - group: SVNCredentials
  - group: TestTrunkVariables
  - group: Azure Connection

  - name: ARTIFACT_NAME
    value: drop
  - name: ZIP_FILE_NAME
    value: SaludPortal.zip
  - name: UNZIP_DESTINATION
    value: '$(Pipeline.Workspace)\SaludPortal'

pool:
  name: Default
  demands:
    - msbuild
    - Cmd

stages:

  - stage: UnzipArtifact
    displayName: 'Download & Unzip SaludPortal Artifact'
    isSkippable: false
    jobs:
      - job: UnzipJob
        displayName: 'Download artifact and unzip SaludPortal.zip'
        timeoutInMinutes: 60
        cancelTimeoutInMinutes: 1
        workspace:
          clean: all

        steps:

          # ── 1. Download the drop artifact ────────────────────────────────
          # The build pipeline publishes via PublishPipelineArtifact@1 which
          # produces a "PipelineArtifact" type. DownloadBuildArtifacts@0 cannot
          # handle this type ("Unsupported artifact type: PipelineArtifact").
          # DownloadPipelineArtifact@2 must be used instead.
          # Definition ID 453 = DVOP_PatientPortal (resolved from pipeline logs).
          - task: DownloadPipelineArtifact@2
            displayName: 'Download drop artifact from DVOP_PatientPortal'
            inputs:
              buildType: 'specific'
              project: 'Titanium'
              definition: '453'
              buildVersionToDownload: 'latestFromBranch'
              branchName: 'refs/heads/104.112'
              artifactName: 'drop'
              targetPath: '$(Pipeline.Workspace)\drop'

          # ── 2. Confirm the zip is present before extraction ──────────────
          - task: PowerShell@2
            displayName: 'Verify SaludPortal.zip exists'
            inputs:
              targetType: inline
              script: |
                $zip = "$(Pipeline.Workspace)\drop\$(ZIP_FILE_NAME)"
                if (-not (Test-Path $zip)) {
                    Write-Error "$(ZIP_FILE_NAME) was NOT found at: $zip"
                    Write-Host "Contents of drop folder:"
                    Get-ChildItem "$(Pipeline.Workspace)\drop" -Recurse | Select-Object FullName
                    exit 1
                }
                Write-Host "$(ZIP_FILE_NAME) found at: $zip"
                $size = (Get-Item $zip).Length / 1MB
                Write-Host "    Size: $([math]::Round($size, 2)) MB"

          # ── 3. Clean destination folder ──────────────────────────────────
          - task: PowerShell@2
            displayName: 'Clean unzip destination folder'
            inputs:
              targetType: inline
              script: |
                $dest = "$(UNZIP_DESTINATION)"
                if (Test-Path $dest) {
                    Write-Host "Removing existing folder: $dest"
                    Remove-Item $dest -Recurse -Force
                }
                New-Item -ItemType Directory -Path $dest -Force | Out-Null
                Write-Host "Destination folder ready: $dest"

          # ── 4. Extract the zip ───────────────────────────────────────────
          - task: ExtractFiles@1
            displayName: 'Unzip SaludPortal.zip'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)\drop\$(ZIP_FILE_NAME)'
              destinationFolder: '$(UNZIP_DESTINATION)'
              cleanDestinationFolder: false

          # ── 5. List extracted contents ───────────────────────────────────
          - task: PowerShell@2
            displayName: 'List extracted contents'
            inputs:
              targetType: inline
              script: |
                $dest = "$(UNZIP_DESTINATION)"
                Write-Host "Extracted contents of $dest :"
                Get-ChildItem -Path $dest -Recurse | Select-Object FullName | Format-Table -AutoSize
          
          - task: PowerShell@2
            displayName: 'Patch Web.config customHeaders URLs'
            inputs:
              targetType: inline
              script: |
                $dest         = "$(UNZIP_DESTINATION)"
                $oldUrls      = @(
                    'https://titanium-salud-cork-qa.saludts.com/',
                    'https://sdt-cork-qa.saludts.com/'
                )
                $newUrl       = 'https://rcsi-cfg.environments.titanium.solutions/'
                $totalFiles   = 0
                $totalChanges = 0

                $configs = Get-ChildItem -Path $dest -Filter 'Web.config' -Recurse -ErrorAction SilentlyContinue

                if ($configs.Count -eq 0) {
                    Write-Warning "No Web.config files found under $dest"
                    exit 0
                }

                foreach ($file in $configs) {
                    Write-Host "Processing: $($file.FullName)"

                    # Read raw bytes and detect encoding to avoid altering line endings
                    $bytes   = [System.IO.File]::ReadAllBytes($file.FullName)
                    $enc     = [System.Text.UTF8Encoding]::new($false)
                    $content = $enc.GetString($bytes)

                    $fileChanged = 0

                    foreach ($old in $oldUrls) {
                        $occurrences = ([regex]::Matches($content, [regex]::Escape($old))).Count
                        if ($occurrences -gt 0) {
                            Write-Host "  Replacing $occurrences occurrence(s) of: $old"
                            $content     = $content -replace [regex]::Escape($old), $newUrl
                            $fileChanged += $occurrences
                        }
                    }

                    if ($fileChanged -gt 0) {
                        # Write back using the same encoding, no BOM, preserving original line endings
                        [System.IO.File]::WriteAllBytes($file.FullName, $enc.GetBytes($content))
                        Write-Host "  Saved $fileChanged replacement(s)"
                        $totalFiles++
                        $totalChanges += $fileChanged
                    } else {
                        Write-Host "  No matching URLs found — file unchanged"
                    }
                }

                Write-Host ""
                Write-Host "PATCH COMPLETE"
                Write-Host "  Web.config files modified : $totalFiles"
                Write-Host "  Total URL replacements    : $totalChanges"
                Write-Host "  New URL applied           : $newUrl"

                # Verification: print the patched customHeaders block
                Write-Host ""
                Write-Host "POST-PATCH VERIFICATION - customHeaders contents:"
                foreach ($file in $configs) {
                    $patched = [System.IO.File]::ReadAllText($file.FullName)
                    $match   = [regex]::Match($patched, '(?s)<customHeaders>.*?</customHeaders>')
                    if ($match.Success) {
                        Write-Host ""
                        Write-Host "File: $($file.FullName)"
                        Write-Host $match.Value
                    }
                }

          # ── Re-publish extracted files as a new artifact ──────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish extracted SaludPortal as artifact'
            inputs:
              targetPath: '$(UNZIP_DESTINATION)'
              artifact: 'SaludPortal-extracted'
              publishLocation: 'pipeline'
            continueOnError: true