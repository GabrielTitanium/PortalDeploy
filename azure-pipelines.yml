trigger: none

resources:
  pipelines:
    - pipeline: BuildPipeline
      source: 'DVOP_PatientPortal'
      trigger:
        branches:
          include:
            - '104.112'

variables:
  - group: Keylocker
  - group: SVNCredentials
  - group: TestTrunkVariables
  - group: Azure Connection
  #- group: PortalDeployment

  - name: ARTIFACT_NAME
    value: drop
  - name: ZIP_FILE_NAME
    value: SaludPortal.zip
  - name: UNZIP_DESTINATION
    value: '$(Pipeline.Workspace)\SaludPortal'
  - name: REPACK_ZIP
    value: '$(Pipeline.Workspace)\SaludPortal.zip'

pool:
  name: Default
  demands:
    - msbuild
    - Cmd

stages:

  - stage: UnzipArtifact
    displayName: 'Download & Unzip SaludPortal Artifact'
    isSkippable: false
    jobs:
      - job: UnzipJob
        displayName: 'Download artifact and unzip SaludPortal.zip'
        timeoutInMinutes: 60
        cancelTimeoutInMinutes: 1
        workspace:
          clean: all

        steps:

          # ── 1. Download the drop artifact ────────────────────────────────
          # The build pipeline publishes via PublishPipelineArtifact@1 which
          # produces a "PipelineArtifact" type. DownloadBuildArtifacts@0 cannot
          # handle this type ("Unsupported artifact type: PipelineArtifact").
          # DownloadPipelineArtifact@2 must be used instead.
          # Definition ID 453 = DVOP_PatientPortal (resolved from pipeline logs).
          - task: DownloadPipelineArtifact@2
            displayName: 'Download drop artifact from DVOP_PatientPortal'
            inputs:
              buildType: 'specific'
              project: 'Titanium'
              definition: '453'
              buildVersionToDownload: 'latestFromBranch'
              branchName: 'refs/heads/104.112'
              artifactName: 'drop'
              targetPath: '$(Pipeline.Workspace)\drop'

          # ── 2. Confirm the zip is present before extraction ──────────────
          - task: PowerShell@2
            displayName: 'Verify SaludPortal.zip exists'
            inputs:
              targetType: inline
              script: |
                $zip = "$(Pipeline.Workspace)\drop\$(ZIP_FILE_NAME)"
                if (-not (Test-Path $zip)) {
                    Write-Error "$(ZIP_FILE_NAME) was NOT found at: $zip"
                    Write-Host "Contents of drop folder:"
                    Get-ChildItem "$(Pipeline.Workspace)\drop" -Recurse | Select-Object FullName
                    exit 1
                }
                Write-Host "$(ZIP_FILE_NAME) found at: $zip"
                $size = (Get-Item $zip).Length / 1MB
                Write-Host "    Size: $([math]::Round($size, 2)) MB"

          # ── 3. Clean destination folder ──────────────────────────────────
          - task: PowerShell@2
            displayName: 'Clean unzip destination folder'
            inputs:
              targetType: inline
              script: |
                $dest = "$(UNZIP_DESTINATION)"
                if (Test-Path $dest) {
                    Write-Host "Removing existing folder: $dest"
                    Remove-Item $dest -Recurse -Force
                }
                New-Item -ItemType Directory -Path $dest -Force | Out-Null
                Write-Host "Destination folder ready: $dest"

          # ── 4. Extract the zip ───────────────────────────────────────────
          - task: ExtractFiles@1
            displayName: 'Unzip SaludPortal.zip'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)\drop\$(ZIP_FILE_NAME)'
              destinationFolder: '$(UNZIP_DESTINATION)'
              cleanDestinationFolder: false

          # ── 5. List extracted contents ───────────────────────────────────
          - task: PowerShell@2
            displayName: 'List extracted contents'
            inputs:
              targetType: inline
              script: |
                $dest = "$(UNZIP_DESTINATION)"
                Write-Host "Extracted contents of $dest :"
                Get-ChildItem -Path $dest -Recurse | Select-Object FullName | Format-Table -AutoSize
          
          - task: PowerShell@2
            displayName: 'Patch Web.config customHeaders URLs'
            inputs:
              filePath: '$(Build.SourcesDirectory)/scripts/Patch-WebConfig.ps1'
              arguments: '-TargetFolder "$(UNZIP_DESTINATION)"'

          - task: PowerShell@2
            displayName: 'Re-zip patched SaludPortal'
            inputs:
              targetType: inline
              script: |
                $src  = "$(UNZIP_DESTINATION)"
                $dest = "$(REPACK_ZIP)"

                if (Test-Path $dest) {
                    Remove-Item $dest -Force
                }

                Add-Type -AssemblyName System.IO.Compression.FileSystem
                [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $dest)

                $size = (Get-Item $dest).Length / 1MB
                Write-Host "Re-zipped to: $dest"
                Write-Host "Size: $([math]::Round($size, 2)) MB"

          # ── 8. Ensure Azure CLI is installed ─────────────────────────────
          - task: PowerShell@2
            displayName: 'Ensure Azure CLI is installed'
            inputs:
              targetType: inline
              script: |
                $az = Get-Command az -ErrorAction SilentlyContinue
                if ($az) {
                    Write-Host "Azure CLI already installed at: $($az.Source)"
                    az --version
                } else {
                    Write-Host "Azure CLI not found. Installing..."
                    $installer = "$env:TEMP\AzureCLI.msi"
                    Invoke-WebRequest -Uri 'https://aka.ms/installazurecliwindows' -OutFile $installer
                    Start-Process msiexec.exe -Wait -ArgumentList "/I $installer /quiet /norestart"
                    Remove-Item $installer -Force
                    Write-Host "Azure CLI installed successfully."
                }

                # Always write the az path to a pipeline variable so the deploy step can use it
                $candidates = @(
                    'C:\Program Files (x86)\Microsoft SDKs\Azure\CLI2\wbin\az.cmd',
                    'C:\Program Files\Microsoft SDKs\Azure\CLI2\wbin\az.cmd'
                )
                $azPath = $null
                foreach ($c in $candidates) {
                    if (Test-Path $c) { $azPath = $c; break }
                }
                if (-not $azPath) {
                    $found = Get-Command az -ErrorAction SilentlyContinue
                    if ($found) { $azPath = $found.Source }
                }
                if (-not $azPath) {
                    Write-Error "az CLI could not be located after install."
                    exit 1
                }
                Write-Host "az located at: $azPath"
                Write-Host "##vso[task.setvariable variable=AZ_PATH]$azPath"

          # ── Re-publish extracted files as a new artifact ──────────────
          #- task: PublishPipelineArtifact@1
           # displayName: 'Publish extracted SaludPortal as artifact'
            #inputs:
              #targetPath: '$(UNZIP_DESTINATION)'
             # artifact: 'SaludPortal-extracted'
             # publishLocation: 'pipeline'
           # continueOnError: true
          
        # ── 8. Deploy to Azure Web App ───────────────────────────────────
          # ── 9. Deploy to Azure Web App ───────────────────────────────────
          - task: PowerShell@2
            displayName: 'Deploy SaludPortal to Azure Web App'
            inputs:
              targetType: inline
              script: |
                $az = "$(AZ_PATH)"
                Write-Host "Using az at: $az"

                Write-Host "Logging in..."
                & $az login `
                    --service-principal `
                    --tenant   "26219bd8-7fd9-4860-bf47-ed0ce0a65a2f" `
                    --username "$(AZ_CLIENT_ID)" `
                    "--password=$(AZ_CLIENT_SECRET)"

                if ($LASTEXITCODE -ne 0) {
                    Write-Error "az login failed. Check AZ_CLIENT_ID and AZ_CLIENT_SECRET in the PortalDeployment variable group."
                    exit 1
                }

                Write-Host "Setting subscription..."
                & $az account set --subscription "1d0c3e4e-0a66-4799-b950-6b4eeee4684b"

                if ($LASTEXITCODE -ne 0) {
                    Write-Error "az account set failed."
                    exit 1
                }

                Write-Host "Deploying to TitaniumPatientPortalTrunk..."
                & $az webapp deployment source config-zip `
                    --resource-group "PortalTrunk" `
                    --name           "TitaniumPatientPortalTrunk" `
                    --src            "$(REPACK_ZIP)"

                if ($LASTEXITCODE -ne 0) {
                    Write-Error "Deployment failed."
                    exit 1
                }

                Write-Host ""
                Write-Host "DEPLOYMENT COMPLETE"
                Write-Host "  Resource Group : PortalTrunk"
                Write-Host "  Web App        : TitaniumPatientPortalTrunk"
                Write-Host "  Package        : $(REPACK_ZIP)"